  <!-- R1: Central → MCP Server -->
  <circle r="4" cx="639" cy="65" fill="#292D3A">
    <animateMotion dur="5s" repeatCount="indefinite" begin="3s"
      path="M 0 0 L -57 0" calcMode="linear" keyTimes="0;0.16;1" keyPoints="0;1;1"/>
