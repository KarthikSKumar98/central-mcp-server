      values="0;1;1;0;0" keyTimes="0;0.02;0.14;0.16;1"/>
  </circle>

  <!-- R2: MCP Server → MCP Client -->
  <circle r="4" cx="429" cy="65" fill="#292D3A">
    <animateMotion dur="5s" repeatCount="indefinite" begin="3.8s"
      path="M 0 0 L -57 0" calcMode="linear" keyTimes="0;0.16;1" keyPoints="0;1;1"/>
    <animate attributeName="opacity" dur="5s" repeatCount="indefinite" begin="3.8s"
      values="0;1;1;0;0" keyTimes="0;0.02;0.14;0.16;1"/>
  </circle>

  <!-- R3: MCP Client → User -->
  <circle r="4" cx="219" cy="65" fill="#292D3A">
